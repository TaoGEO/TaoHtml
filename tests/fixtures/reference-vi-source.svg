  <text x="874" y="604" fill="#f4efe5" font-family="Arial,sans-serif" font-size="17" font-weight="800">53</text>
  <text x="968" y="572" fill="#f4efe5" font-family="Arial,sans-serif" font-size="17" font-weight="800">68</text>

  <text x="88" y="814" fill="#565a58" font-family="Arial,PingFang SC,sans-serif" font-size="15">样张用途：TaoHtml 单张静态参考 VI 规范板回归与视觉验收</text>
  <text x="1058" y="814" fill="#17191a" font-family="Arial,sans-serif" font-size="15" font-weight="800">07</text>
</svg>
