<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Valid compact SVG labels</title>
  <link rel="stylesheet" href="base.css">
</head>
<body>
  <main class="deck" data-mode="reading" data-taohtml-step-contract="fragment-v1">
    <section class="slide active" data-title="Valid compact chart">
      <h1>Compact but separated labels</h1>

        <text class="key-first" x="100" y="150" font-family="Arial" font-size="20">Segment A 48%</text>
        <text class="key-second" x="100" y="178" font-family="Arial" font-size="20">Segment B 52%</text>
      </svg>
    </section>
  </main>
  <script src="runtime.js"></script>

</html>
