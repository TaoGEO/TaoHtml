<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Slight SVG label overlap</title>
  <link rel="stylesheet" href="base.css">
</head>
<body>
  <main class="deck" data-mode="reading" data-taohtml-step-contract="fragment-v1">
    <section class="slide active" data-title="Compact chart">
      <h1>Synthetic distribution</h1>
      <svg viewBox="0 0 720 300" aria-label="Synthetic chart labels">
        <text class="legend-alpha" x="100" y="160" font-family="Arial" font-size="20">North group 47%</text>
        <text class="legend-beta" x="100" y="181.8" font-family="Arial" font-size="20">South group 53%</text>
      </svg>
    </section>
  </main>
  <script src="runtime.js"></script>
</body>
</html>
