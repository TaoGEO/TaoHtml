<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Collision after controlled reveal</title>
  <link rel="stylesheet" href="base.css">
</head>
<body>
  <main class="deck" data-mode="presentation" data-taohtml-step-contract="fragment-v1">
    <section class="slide active" data-title="Reveal state collision">
      <h1>Synthetic staged chart</h1>
      <svg viewBox="0 0 720 300" aria-label="Staged synthetic labels">
        <text class="state-base" x="120" y="160" font-family="Arial" font-size="28">Existing state</text>
        <text class="state-reveal fragment" data-step="1" x="190" y="160" font-family="Arial" font-size="28">Revealed state</text>
      </svg>
    </section>
  </main>
  <script src="runtime.js"></script>
</body>
</html>
