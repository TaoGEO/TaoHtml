<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Tight valid ancestor boundary</title>
  <link rel="stylesheet" href="base.css">
  <style>
    .tight-window {
      position: absolute;
      left: 360px;
      top: 280px;
      width: 340px;
      height: 40px;
      overflow: hidden;
      border-left: 2px solid #214f7a;
      border-right: 2px solid #214f7a;
    }
    .tight-flow-copy {
      margin: 0;
      white-space: nowrap;
      font-size: 30px;
      line-height: 40px;
    }
  </style>
</head>
<body>
  <main class="deck" data-mode="reading" data-taohtml-step-contract="fragment-v1">
    <section class="slide active" data-title="Tight valid flow">
      <h1>Boundary-safe flow</h1>
      <div class="tight-window">
        <p class="tight-flow-copy">Complete and readable</p>
      </div>
    </section>
  </main>
  <script src="runtime.js"></script>
</body>
</html>
