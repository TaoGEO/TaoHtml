name: TaoHtml Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run capability preflights
        run: |
          python skill/taohtml/scripts/preflight.py --profile core --workspace .
          python skill/taohtml/scripts/preflight.py --profile pdf --workspace .
          python skill/taohtml/scripts/preflight.py --profile static-reference --workspace .
          python skill/taohtml/scripts/preflight.py --profile profile-reuse --workspace .
          python skill/taohtml/scripts/preflight.py --profile browser --workspace .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile scripts
        run: python -m py_compile scripts/*.py skill/taohtml/scripts/*.py

      - name: Check template assets
        run: python skill/taohtml/scripts/check_assets.py skill/taohtml/assets/html-deck-template/index.html --strict-offline

      - name: Run template browser QA at target viewports
        run: |
          python skill/taohtml/scripts/check_html_deck.py skill/taohtml/assets/html-deck-template/index.html .artifacts/template-qa-1366 --width 1366 --height 768
          python skill/taohtml/scripts/check_html_deck.py skill/taohtml/assets/html-deck-template/index.html .artifacts/template-qa-1600 --width 1600 --height 900
          python skill/taohtml/scripts/check_html_deck.py skill/taohtml/assets/html-deck-template/index.html .artifacts/template-qa-1920 --width 1920 --height 1080

      - name: Run content editor browser QA
        run: |
          python skill/taohtml/scripts/render_visual_system.py --content evals/taohtml-quality-v1/fixtures/visual-systems-content.json --theme black-white-fluorescent-cards --output .artifacts/editor-fixture.html
          python skill/taohtml/scripts/check_assets.py .artifacts/editor-fixture.html --strict-offline
          python skill/taohtml/scripts/check_editor_runtime.py .artifacts/editor-fixture.html .artifacts/editor-qa

      - name: Build QA contact sheet
        run: python skill/taohtml/scripts/build_contact_sheet.py .artifacts/template-qa-1600 .artifacts/template-contact-sheet.png

      - name: Package template
        run: |
          short_sha="${GITHUB_SHA::7}"
          python skill/taohtml/scripts/package_deck.py skill/taohtml/assets/html-deck-template ".artifacts/taohtml-template-ci-${short_sha}.zip"
          python scripts/package_plugin_marketplace.py ".artifacts/taohtml-marketplace-ci-${short_sha}.zip"
          python scripts/package_skillhub.py ".artifacts/taohtml-skillhub-ci-${short_sha}.zip"

      - name: Upload QA artifacts
        uses: actions/upload-artifact@v7
        with:
          name: taohtml-template-qa
          path: .artifacts/
          if-no-files-found: error
          include-hidden-files: true

  windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install skill dependencies and Chromium
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r skill/taohtml/requirements.txt
          python -m playwright install chromium

      - name: Smoke dependency imports
        run: python -c "import fitz, PIL, yaml; import playwright.sync_api; print('DEPENDENCY_IMPORTS_OK')"

      - name: Run preflight regression tests
        run: python -m unittest discover -s tests -p "test_preflight.py" -v

      - name: Run immediate authorization and browser QA gate regressions
        run: |
          python -m unittest discover -s tests -p "test_production_authorization.py" -v
          python -m unittest discover -s tests -p "test_html_qa_gates.py" -v

      - name: Run Windows capability preflights
        run: |
          python skill/taohtml/scripts/preflight.py --profile core --workspace .
          python skill/taohtml/scripts/preflight.py --profile pdf --workspace .
          python skill/taohtml/scripts/preflight.py --profile static-reference --workspace .
          python skill/taohtml/scripts/preflight.py --profile profile-reuse --workspace .
          python skill/taohtml/scripts/preflight.py --profile browser --workspace .

      - name: Smoke corporate reference VI and project-theme chain
        run: |
          python skill/taohtml/scripts/render_reference_vi.py --data tests/fixtures/corporate-template-vi-contract.json --source-image tests/fixtures/corporate-template-reference.png --output .artifacts/windows/corporate-reference-vi
          python skill/taohtml/scripts/compile_project_theme.py --request tests/fixtures/corporate-template-handoff.json --output-theme .artifacts/windows/project-theme
